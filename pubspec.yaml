name: parse_mermaid_dart
description: Analyzes Dart projects and generates Mermaid class diagrams from source code, detecting inheritance, interfaces, mixins, and dependencies.
version: 0.2.0

homepage: https://github.com/elguala9/ParseMermaidDart
repository: https://github.com/elguala9/ParseMermaidDart
issue_tracker: https://github.com/elguala9/ParseMermaidDart/issues
documentation: https://github.com/elguala9/ParseMermaidDart/blob/main/README.md

environment:
  sdk: ^3.4.0

dependencies:
  analyzer: ^6.0.0
  glob: ^2.1.2
  http: ^1.1.0
  path: ^1.9.0
  yaml: ^3.1.0

dev_dependencies:
  lints: ^3.0.0
  test: ^1.25.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_serializable: ^6.7.0

executables:
  parse: parse

platforms:
  linux:
  macos:
  windows:
