name: parse_dart
repository: https://github.com/lgualandi/parse_dart

packages:
  - .

command:
  bootstrap:
    runPubGetInParallel: true

scripts:
  test:
    description: Run all tests
    run: dart test
    exec:
      concurrency: 1

  test:watch:
    description: Run tests in watch mode
    run: dart test --watch
    exec:
      concurrency: 1

  test:coverage:
    description: Run tests with coverage
    run: |
      dart test --coverage=coverage
      dart pub global activate coverage
      dart pub global run coverage:format_coverage --lcov --in=coverage --out=coverage/lcov.info --packages=.packages

  analyze:
    description: Analyze code
    run: dart analyze

  format:
    description: Format code with dart format
    run: dart format . --set-exit-if-changed

  format:fix:
    description: Format code with dart format and fix
    run: dart format .

  lint:
    description: Run lint checks
    run: dart analyze --fatal-infos

  pub:get:
    description: Get dependencies
    run: dart pub get

  pub:upgrade:
    description: Upgrade dependencies
    run: dart pub upgrade

  pub:outdated:
    description: Show outdated packages
    run: dart pub outdated

  clean:
    description: Clean generated files and build artifacts
    run: |
      dart pub cache clean
      find . -type d -name ".dart_tool" -exec rm -rf {} +
      find . -type f -name "pubspec.lock" -delete

  build:example:
    description: Build example
    run: dart run example/main.dart

  dev:
    description: Run complete dev setup (get deps, analyze, test)
    run: |
      dart pub get
      dart analyze
      dart test

  ci:
    description: Run CI checks (analyze, test, coverage)
    run: |
      dart analyze --fatal-infos
      dart test

  check:all:
    description: Run all checks (format, analyze, test)
    run: |
      dart format . --set-exit-if-changed
      dart analyze --fatal-infos
      dart test
